services:
  pentestgpt:
    container_name: pentestgpt
    image: pentestgpt:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount workspace for file operations
      - ./workspace:/workspace
      # Persist Claude Code configuration across container restarts
      - claude-config:/home/pentester/.claude
      # Persist CCR configuration
      - ccr-config:/home/pentester/.claude-code-router
    # Shares the host's network namespace/routing table directly (no NAT/bridge),
    # so outbound traffic follows the host's own routes/policy rules (e.g. multi-interface setups).
    network_mode: host
    stdin_open: true
    tty: true
    # Resource allocation - adjust based on your system
    # More CPUs and memory improve performance for complex tasks
    deploy:
      resources:
        limits:
          cpus: '4'        # Max 4 CPU cores (adjust higher if available)
          memory: 8G       # Max 8GB RAM
        reservations:
          cpus: '2'        # Guarantee 2 CPU cores
          memory: 4G       # Guarantee 4GB RAM
    environment:
      # Terminal settings for proper TUI rendering
      - TERM=xterm-256color
      # Python settings
      - PYTHONUNBUFFERED=1
      # Auth mode: "local", "openrouter", "anthropic", or "manual"
      - PENTESTGPT_AUTH_MODE=${PENTESTGPT_AUTH_MODE:-local}
      # Local SSH access. Override or use PENTESTGPT_SSH_AUTHORIZED_KEYS for keys.
      - PENTESTGPT_SSH_PASSWORD=${PENTESTGPT_SSH_PASSWORD:-pentestgpt}
      # With host networking there's no port remap, so sshd binds directly to this
      # port on the VM. Defaults to 2222 (not 22) to avoid clashing with the host's
      # own sshd.
      - PENTESTGPT_SSH_PORT=${PENTESTGPT_SSH_PORT:-2222}
      # Web UI listens inside the container; with host networking there's no Compose
      # port mapping, so this is the actual bind address on the VM. 0.0.0.0 means the
      # web UI is reachable from any interface (no localhost-only protection like the
      # bridge compose file provides) -- set to 127.0.0.1 to restrict it, e.g. behind
      # an SSH tunnel.
      - PENTESTGPT_WEB_HOST=${PENTESTGPT_WEB_HOST:-0.0.0.0}
      - PENTESTGPT_WEB_PORT=${PENTESTGPT_WEB_PORT:-8080}
      - PENTESTGPT_CCR_LOG=/tmp/ccr.log
      - PENTESTGPT_ACTIVITY_LOG=/workspace/pentestgpt-activity.log
      - PENTESTGPT_RUNTIME_CONFIG=/workspace/pentestgpt.yml
      # API keys (set based on auth mode via .env.auth)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

volumes:
  # Named volume for Claude Code config persistence
  claude-config:
  # Named volume for CCR config persistence
  ccr-config:
